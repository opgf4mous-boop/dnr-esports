<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNR Esports</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="dnr-logo.png" alt="DNR Logo">
        </div>
        <nav>
            <ul>
                <li><a href="#hero">Home</a></li>
                <li><a href="#team">Team</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <section id="hero" class="hero">
        <h1>Welcome to DNR Esports</h1>
        <p>Your journey in esports begins here!</p>
        <a href="#team" class="button">Meet the Team</a>
    </section>
    <section id="team" class="team-info">
        <h2>Meet Our Team</h2>
        <div class="team-member">
            <h3>Player Name</h3>
            <p>Role</p>
        </div>
        <!-- Add more team members as necessary -->
    </section>
    <section id="contact" class="contact">
        <h2>Contact Us</h2>
        <form>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <label for="message">Message:</label>
            <textarea id="message" name="message" required></textarea>
            <button type="submit">Send</button>
        </form>
    </section>
    <footer>
        <p>&copy; 2026 DNR Esports. All rights reserved.</p>
    </footer>
</body>
</html>
